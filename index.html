    function looksSwapped(lon, lat) {
      return Math.abs(lon) <= 90 && Math.abs(lat) > 90 && Math.abs(lat) <= 180;

    function keyLookupFromKeys(keys, patterns) {
      const found = keys.find(k => patterns.some(rx => rx.test(String(k))));
      return found || null;
    }

    function parseCoordsField(val) {
      if (val == null) return null;
      const s = String(val).trim();
      const m = s.match(/-?\d+(?:\.\d+)?/g);
      if (!m || m.length < 2) return null;
      let lat = parseFloat(m[0]), lon = parseFloat(m[1]);
      if (Math.abs(lat) > 90 && Math.abs(lon) <= 90) { const t = lat; lat = lon; lon = t; }
      if (!isFinite(lat) || !isFinite(lon)) return null;
      return { lat, lon };
    }

    function makePopup(props) {
      if (!props) return "";
      const rows = [];
      const isUrl = v => typeof v === "string" && /^https?:\/\//i.test(v);
      const domainText = url => { try { return new URL(url).hostname.replace(/^www\./,""); } catch { return url; } };

      for (const [k, rawV] of Object.entries(props)) {
        if (rawV == null) continue;
        let v = String(rawV).trim();
        if (!v || v.toLowerCase() === "null") continue;

        if (isUrl(v)) v = `<a href="${rawV}" target="_blank" rel="noopener">${domainText(rawV)}</a>`;

        const label = LABEL_MAP_HTML[k] || k;
        rows.push(
          `<tr>
            <th style="text-align:left; padding-right:10px; white-space:nowrap;">${label}</th>
            <td>${v}</td>
          </tr>`
        );
      }

      return `<div style="font:13px/1.35 system-ui, Segoe UI, Roboto, Arial;">
                <table>${rows.join("")}</table>
              </div>`;
    }

    function haversineMiles(lat1, lon1, lat2, lon2) {
      const toRad = deg => deg * Math.PI / 180;
      const R = 3958.7613;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function getHurricaneCategoryFromMph(mph) {
      const v = Number(mph);
      if (!isFinite(v)) return { cat: "TS/TD", color: "#4fc3f7", damage: "Below hurricane category" };
      if (v >= 157) return { cat: "Category 5", color: "#6a1b9a", damage: "Total Destruction" };
      if (v >= 130) return { cat: "Category 4", color: "#d81b60", damage: "Catastrophic" };
      if (v >= 111) return { cat: "Category 3", color: "#f4511e", damage: "Devastating" };
      if (v >= 96)  return { cat: "Category 2", color: "#fb8c00", damage: "Extremely Dangerous" };
      if (v >= 74)  return { cat: "Category 1", color: "#fdd835", damage: "Very Dangerous" };
      return { cat: "TS/TD", color: "#4fc3f7", damage: "Below hurricane category" };
    }

    // =========================================================
    // 4) CSV LOADING
    // =========================================================
    async function readCsvObjectsFromUrl(url) {
      return new Promise((resolve, reject) => {
        Papa.parse(url, {
          download: true,
          header: true,
          dynamicTyping: false,
          skipEmptyLines: true,
          complete: (results) => {
            if (results.errors && results.errors.length) {
              console.warn("CSV parse warnings:", results.errors.slice(0, 5));
            }
            resolve(results.data || []);
          },
          error: (err) => reject(err),
        });
      });
    }

    async function readTruckCrashCsv(url) {
      return new Promise((resolve, reject) => {
        Papa.parse(url, {
          download: true,
          header: true,
          dynamicTyping: false,
          skipEmptyLines: true,
          preview: 0,
          beforeFirstChunk: function (chunk) {
            const lines = chunk.split(/\r\n|\n|\r/);
            return lines.slice(12).join("\n");
          },
          complete: (results) => resolve(results.data || []),
          error: (err) => reject(err),
        });
      });
    }

        wildfireRows = await readCsvObjectsFromUrl(WILDFIRE_EVENTS_CSV);
        wildfireRows = wildfireRows
          .map(r => ({ ...r, LATITUDE: parseFloat(r.LATITUDE), LONGITUDE: parseFloat(r.LONGITUDE) }))
          .filter(r => isFinite(r.LATITUDE) && isFinite(r.LONGITUDE));
      }

      if (!tornadoRows) {
        tornadoRows = await readCsvObjectsFromUrl(TORNADO_EVENTS_CSV);
        tornadoRows = tornadoRows
          .map(r => ({
            ...r,
            slat: parseFloat(r.slat),
            slon: parseFloat(r.slon),
            elat: parseFloat(r.elat),
            elon: parseFloat(r.elon),
            mag: Number(r.mag),
            inj: Number(r.inj),
            fat: Number(r.fat),
            len: Number(r.len),
            wid: Number(r.wid)
          }))
          .filter(r => String(r.st).toUpperCase() === "TX" && isFinite(r.slat) && isFinite(r.slon));
      }

      if (!hurricaneRows) {
        hurricaneRows = await readCsvObjectsFromUrl(HURRICANE_EVENTS_CSV);
        hurricaneRows = hurricaneRows
          .map(r => ({
            ...r,
            "Geograpic Latitude": parseFloat(r["Geograpic Latitude"]),
            "Geographic Longitude": parseFloat(r["Geographic Longitude"]),
            "Maximum Sustained Wind (knots)": Number(r["Maximum Sustained Wind (knots)"]),
            "Minimum Sea Level Pressure (millibars)": Number(r["Minimum Sea Level Pressure (millibars)"]),
            "Calendar Year": Number(r["Calendar Year"]),
            "max_sustained_wind_kt_nearby": Number(r["max_sustained_wind_kt_nearby"]),
            "max_sustained_wind_mph_nearby": Number(r["max_sustained_wind_mph_nearby"])
          }))
          .filter(r => isFinite(r["Geograpic Latitude"]) && isFinite(r["Geographic Longitude"]));
      }

      if (!truckRows) {
        truckRows = await readTruckCrashCsv(TRUCK_CRASH_EVENTS_CSV);
        truckRows = truckRows
          .map(r => ({
            ...r,
            "Latitude": parseFloat(r["Latitude"]),
            "Longitude": parseFloat(r["Longitude"])
          }))
          .filter(r => r["Crash ID"] !== undefined && isFinite(r["Latitude"]) && isFinite(r["Longitude"]));
      }
    }

    function getDisplayedPoints(points) {
      const selected = typeFilter.value;
      if (selected === "Top 20") {
        return points.filter(p => p.r[INCIDENT_KEY] === "Top 20");
      }
      if (selected === "Top 50") {
        return points.filter(p => p.r[INCIDENT_KEY] === "Top 20" || p.r[INCIDENT_KEY] === "Top 50");
      }
      if (selected === "Top 100") {
        return points.filter(p =>
          p.r[INCIDENT_KEY] === "Top 20" ||
          p.r[INCIDENT_KEY] === "Top 50" ||
          p.r[INCIDENT_KEY] === "Top 100"
        );
      }
      return points;
    }

    async function drawHazardOverlays(points, dataset) {
      if (hazardLayer) { map.removeLayer(hazardLayer); hazardLayer = null; }
      if (trackLayer) { map.removeLayer(trackLayer); trackLayer = null; }

      hazardToggleWrap.style.display = "none";
      trackToggleWrap.style.display = "none";

      if (!["wildfire", "tornado", "hurricane", "other-truck"].includes(dataset.id)) return;
      await ensureExtraDataLoaded();

      const displayedPoints = getDisplayedPoints(points);
      if (!displayedPoints.length) return;

      const hazardMarkers = [];
      const extraTracks = [];

      if (dataset.id === "wildfire") {
        hazardToggleWrap.style.display = "inline-block";
        trackToggleWrap.style.display = "inline-block";

        const matchedWildfires = [];
        for (const wf of wildfireRows) {
          let nearestBridge = null;
          let nearestDistance = Infinity;

          for (const p of displayedPoints) {
            const d = haversineMiles(p.lat, p.lon, wf.LATITUDE, wf.LONGITUDE);
            if (d <= WILDFIRE_RADIUS_MILES && d < nearestDistance) {
              nearestDistance = d;
              nearestBridge = p;
            }
          }

          if (nearestBridge) {
            matchedWildfires.push({
              wf,
              nearestBridge,
              nearestDistance
            });
          }
        }

        if (hazardToggle.checked) {
          matchedWildfires.forEach(item => {
            hazardMarkers.push(
              L.marker([item.wf.LATITUDE, item.wf.LONGITUDE], {
                icon: wildfireIcon(item.wf.FIRE_SIZE)
              }).bindPopup(
                wildfirePopupHtml(item.wf, `${item.nearestBridge.r.STRUCTURE_NUMBER_008 || "Bridge"} (${item.nearestDistance.toFixed(2)} mi)`)
              )
            );
          });
        }

        if (trackToggle.checked) {
          displayedPoints.forEach(p => {
            extraTracks.push(
              L.circle([p.lat, p.lon], {
                radius: WILDFIRE_RADIUS_MILES * 1609.344,
                color: "#cc5500",
                weight: 1.2,
                opacity: 0.9,
                fillColor: "#ffb347",
                fillOpacity: 0.08
              })
            );
          });
        }

        if (matchedWildfires.length) {
          status.textContent += `\nNearby wildfire incidents: ${matchedWildfires.length}`;
        }
      }

      if (dataset.id === "tornado") {
        hazardToggleWrap.style.display = "inline-block";
        trackToggleWrap.style.display = "inline-block";

        const matchedTornadoes = [];
        for (const td of tornadoRows) {
          let nearestBridge = null;
          let nearestDistance = Infinity;

          for (const p of displayedPoints) {
            const d = haversineMiles(p.lat, p.lon, td.slat, td.slon);
            if (d <= TORNADO_RADIUS_MILES && d < nearestDistance) {
              nearestDistance = d;
              nearestBridge = p;
            }
          }

          if (nearestBridge) {
            matchedTornadoes.push({
              td,
              nearestBridge,
              nearestDistance
            });
          }
        }

        if (hazardToggle.checked) {
          matchedTornadoes.forEach(item => {
            hazardMarkers.push(
              L.marker([item.td.slat, item.td.slon], {
                icon: tornadoIcon(item.td.mag)
              }).bindPopup(
                tornadoPopupHtml(item.td, `${item.nearestBridge.r.STRUCTURE_NUMBER_008 || "Bridge"} (${item.nearestDistance.toFixed(2)} mi)`)
              )
            );
          });
        }

        if (trackToggle.checked) {
          matchedTornadoes
            .filter(item =>
              isFinite(item.td.elat) && isFinite(item.td.elon) &&
              !(item.td.elat === 0 && item.td.elon === 0) &&
              !(item.td.elat === item.td.slat && item.td.elon === item.td.slon)
            )
            .forEach(item => {
              extraTracks.push(
                L.polyline([[item.td.slat, item.td.slon], [item.td.elat, item.td.elon]], {
                  color: "#4b0082",
                  weight: Math.max(2, Math.min(6, (Number(item.td.mag) || 0) + 1)),
                  opacity: 0.65
                }).bindPopup(
                  tornadoPopupHtml(item.td, `${item.nearestBridge.r.STRUCTURE_NUMBER_008 || "Bridge"} (${item.nearestDistance.toFixed(2)} mi)`)
                )
              );
            });
        }

        if (matchedTornadoes.length) {
          status.textContent += `\nNearby tornado events: ${matchedTornadoes.length}`;
        }
      }

      if (dataset.id === "hurricane") {
        hazardToggleWrap.style.display = "inline-block";
        trackToggleWrap.style.display = "inline-block";

        const matchedHurricanes = [];
        for (const hc of hurricaneRows) {
          let nearestBridge = null;
          let nearestDistance = Infinity;

          for (const p of displayedPoints) {
            const d = haversineMiles(p.lat, p.lon, hc["Geograpic Latitude"], hc["Geographic Longitude"]);
            if (d <= HURRICANE_RADIUS_MILES && d < nearestDistance) {
              nearestDistance = d;
              nearestBridge = p;
            }
          }

          if (nearestBridge) {
            matchedHurricanes.push({
              hc,
              nearestBridge,
              nearestDistance
            });
          }
        }

        if (hazardToggle.checked) {
          matchedHurricanes.forEach(item => {
            hazardMarkers.push(
              L.marker([item.hc["Geograpic Latitude"], item.hc["Geographic Longitude"]], {
                icon: hurricaneIcon(
                  item.hc["max_sustained_wind_mph_nearby"] ??
                  (Number(item.hc["Maximum Sustained Wind (knots)"]) * 1.15078)
                )
              }).bindPopup(
                hurricanePopupHtml(item.hc, `${item.nearestBridge.r.STRUCTURE_NUMBER_008 || "Bridge"} (${item.nearestDistance.toFixed(2)} mi)`)
              )
            );
          });
        }

        if (trackToggle.checked) {
          const grouped = {};
          matchedHurricanes.forEach(item => {
            const sid = item.hc["Storm Identifier"] || "UNKNOWN";
            if (!grouped[sid]) grouped[sid] = [];
            grouped[sid].push(item);
          });

          Object.values(grouped).forEach(arr => {
            arr.sort((a, b) => new Date(a.hc["Observation Date"]) - new Date(b.hc["Observation Date"]));
            const coords = arr.map(x => [x.hc["Geograpic Latitude"], x.hc["Geographic Longitude"]]);

            const maxWindMphFromTrack = Math.max(
              ...arr.map(x => Number(x.hc["max_sustained_wind_mph_nearby"])).filter(Number.isFinite),
              ...arr.map(x => Number(x.hc["Maximum Sustained Wind (knots)"]) * 1.15078).filter(Number.isFinite),
              0
            );

            const categoryInfo = getHurricaneCategoryFromMph(maxWindMphFromTrack);
            const stormName = arr[0].hc["Storm Name"] || "Storm";

            extraTracks.push(
              L.polyline(coords, {
                color: categoryInfo.color,
                weight: categoryInfo.cat === "Category 5" ? 6 :
                        categoryInfo.cat === "Category 4" ? 5 :
                        categoryInfo.cat === "Category 3" ? 4.5 :
                        categoryInfo.cat === "Category 2" ? 4 :
                        categoryInfo.cat === "Category 1" ? 3.5 : 3,
                opacity: 0.78
              }).bindPopup(`
                <div style="font:13px/1.35 system-ui,Segoe UI,Roboto,Arial;">
                  <div style="font-weight:700; margin-bottom:6px;">Hurricane Track</div>
                  <table>
                    <tr><th>Storm Name</th><td>${stormName}</td></tr>
                    <tr><th>Storm ID</th><td>${arr[0].hc["Storm Identifier"] || "NA"}</td></tr>
                    <tr><th>Year</th><td>${arr[0].hc["Calendar Year"] || "NA"}</td></tr>
                    <tr><th>Track points shown</th><td>${arr.length}</td></tr>
                    <tr><th>Max nearby wind</th><td>${isFinite(maxWindMphFromTrack) ? maxWindMphFromTrack.toFixed(1) : "NA"} mph</td></tr>
                    <tr><th>Category</th><td>${categoryInfo.cat}</td></tr>
                    <tr><th>Damage Level</th><td>${categoryInfo.damage}</td></tr>
                  </table>
                </div>
              `)
            );
          });
        }

        if (matchedHurricanes.length) {
          status.textContent += `\nNearby hurricane observations: ${matchedHurricanes.length}`;
        }
      }

      if (dataset.id === "other-truck") {
        hazardToggleWrap.style.display = "inline-block";
        trackToggleWrap.style.display = "inline-block";

        const matchedCrashes = [];
        for (const cr of truckRows) {
          let nearestBridge = null;
          let nearestDistance = Infinity;

          for (const p of displayedPoints) {
            const d = haversineMiles(p.lat, p.lon, cr["Latitude"], cr["Longitude"]);
            if (d <= TRUCK_RADIUS_MILES && d < nearestDistance) {
              nearestDistance = d;
              nearestBridge = p;
            }
          }

          if (nearestBridge) {
            matchedCrashes.push({
              cr,
              nearestBridge,
              nearestDistance
            });
          }
        }

        if (hazardToggle.checked) {
          matchedCrashes.forEach(item => {
            hazardMarkers.push(
              L.marker([item.cr["Latitude"], item.cr["Longitude"]], {
                icon: truckIcon(item.cr["Crash Severity"])
              }).bindPopup(
                truckPopupHtml(item.cr, `${item.nearestBridge.r.STRUCTURE_NUMBER_008 || "Bridge"} (${(item.nearestDistance * 1609.344).toFixed(1)} m)`)
              )
            );
          });
        }

        if (trackToggle.checked) {
          matchedCrashes.forEach(item => {
            extraTracks.push(
              L.polyline(
                [[item.nearestBridge.lat, item.nearestBridge.lon], [item.cr["Latitude"], item.cr["Longitude"]]],
                {
                  color: "#2f4f4f",
                  weight: 1.8,
                  opacity: 0.55,
                  dashArray: "4,4"
                }
              ).bindPopup(
                truckPopupHtml(item.cr, `${item.nearestBridge.r.STRUCTURE_NUMBER_008 || "Bridge"} (${(item.nearestDistance * 1609.344).toFixed(1)} m)`)
              )
            );
          });
        }

        if (matchedCrashes.length) {
          status.textContent += `\nNearby truck-related crashes: ${matchedCrashes.length}`;
        }
      }

      if (hazardMarkers.length) {
        hazardLayer = L.featureGroup(hazardMarkers).addTo(map);
      }
      if (extraTracks.length) {
        trackLayer = L.featureGroup(extraTracks).addTo(map);
      }
    }

    async function plotFromRows(rows, dataset) {
      const RISK_INDEX_COL = dataset.riskIndexCol;

      if (!rows.length) throw new Error("No rows found in CSV.");

      const sorted = [...rows].sort((a, b) => {
        const va = Number(a[RISK_INDEX_COL]);
        const vb = Number(b[RISK_INDEX_COL]);
        if (!isFinite(va) && !isFinite(vb)) return 0;
        if (!isFinite(va)) return 1;
        if (!isFinite(vb)) return -1;
        return vb - va;
      });

      sorted.forEach((r, idx) => {
        const rank = idx + 1;
        if (rank <= 20) r[INCIDENT_KEY] = "Top 20";
        else if (rank <= 50) r[INCIDENT_KEY] = "Top 50";
        else if (rank <= 100) r[INCIDENT_KEY] = "Top 100";
        else r[INCIDENT_KEY] = "All Bridges";
      });

      const sample = sorted[0] || {};
      const keys = Object.keys(sample);

      const latKey = keyLookupFromKeys(keys, [/^lat(i(tude)?)?$/i, /^lat_?dd$/i, /^lat_?\d+/i, /^lat/i]);
      const lonKey = keyLookupFromKeys(keys, [/^(lon(g(itude)?)?|lng)$/i, /^lon_?dd$/i, /^long_?\d+/i, /^lon/i, /^long/i]);
      const coordKey = keyLookupFromKeys(keys, [/^coordinates?\s*\(\s*lat\s*,\s*lon\s*\)$/i, /^coordinates$/i, /^coords$/i]);

      if (!((latKey && lonKey) || coordKey)) {
        throw new Error('Could not find latitude/longitude columns or a "coordinates (lat, lon)" column.');
      }

      const points = [];
      for (const r of sorted) {
        let lat, lon;

        if (coordKey) {
          const pair = parseCoordsField(r[coordKey]);
          if (!pair) continue;
          ({ lat, lon } = pair);
        } else {
          lat = parseFloat(r[latKey]);
          lon = parseFloat(r[lonKey]);
        }

        if (!isFinite(lat) || !isFinite(lon)) continue;
        if (looksSwapped(lon, lat)) { const t = lat; lat = lon; lon = t; }

        points.push({ r, lat, lon });
      }
      if (!points.length) throw new Error("No valid coordinates parsed from CSV.");

      if (currentLayer) { map.removeLayer(currentLayer); currentLayer = null; }
      if (hazardLayer) { map.removeLayer(hazardLayer); hazardLayer = null; }
      if (trackLayer) { map.removeLayer(trackLayer); trackLayer = null; }
      if (legendControl) { map.removeControl(legendControl); legendControl = null; }

      groupsByType = { "Top 20": [], "Top 50": [], "Top 100": [], "__ALL__": [] };
      allMarkers = [];
      lastPoints = points;
      lastDataset = dataset;

      const colors = colorMapFor();

      for (const p of points) {
        const lvl = p.r?.[INCIDENT_KEY];
        const riskVal = p.r?.[RISK_INDEX_COL];

        const isTop = (lvl === "Top 20" || lvl === "Top 50" || lvl === "Top 100");
        const fill = isTop ? (colors[lvl] || "#666") : "#777";

        const marker = L.circleMarker([p.lat, p.lon], {
          radius: markerRadiusFromRisk(riskVal, dataset.id),
          fillColor: fill,
          color: "#333",
          weight: 1,
          opacity: 1,
          fillOpacity: 0.9,
        }).bindPopup(makePopup(p.r));   // unchanged bridge popup

        allMarkers.push(marker);
        groupsByType["__ALL__"].push(marker);

        if (lvl === "Top 20") {
          groupsByType["Top 20"].push(marker);
          groupsByType["Top 50"].push(marker);
          groupsByType["Top 100"].push(marker);
        } else if (lvl === "Top 50") {
          groupsByType["Top 50"].push(marker);
          groupsByType["Top 100"].push(marker);
        } else if (lvl === "Top 100") {
          groupsByType["Top 100"].push(marker);
        }
      }

      typeFilter.value = "Top 20";
      currentLayer = L.featureGroup(groupsByType["Top 20"]).addTo(map);

      const b = currentLayer.getBounds();
      if (b.isValid()) map.fitBounds(b.pad(0.1));

      const typeValues = ["Top 20", "Top 50", "Top 100"];
      legendControl = L.control({ position: "topright" });
      legendControl.onAdd = function () {
        const div = L.DomUtil.create("div", "legend");
        const h = document.createElement("div");
        h.textContent = `${dataset.name} (Top Filters)`;
        h.style.fontWeight = "600";
        h.style.marginBottom = "6px";
        div.appendChild(h);

        for (const lvl of typeValues) {
          const row = document.createElement("div"); row.className = "row";
          const sw = document.createElement("span"); sw.className = "swatch"; sw.style.background = colors[lvl];
          const lab = document.createElement("span"); lab.textContent = lvl;
          row.appendChild(sw); row.appendChild(lab);
          div.appendChild(row);
        }

        if (dataset.id === "wildfire") {
          const row1 = document.createElement("div"); row1.className = "row";
          row1.innerHTML = `<span style="width:18px;display:inline-block;text-align:center;margin-right:8px;">🔥</span><span>Nearby wildfire incident</span>`;
          div.appendChild(row1);

          const row2 = document.createElement("div"); row2.className = "row";
          row2.innerHTML = `<span style="width:14px;height:14px;border:1px solid #cc5500;background:rgba(255,179,71,0.15);border-radius:50%;display:inline-block;margin-right:8px;"></span><span>1-mile bridge buffer</span>`;
          div.appendChild(row2);
        }

        if (dataset.id === "tornado") {
          const row1 = document.createElement("div"); row1.className = "row";
          row1.innerHTML = `<span style="width:18px;display:inline-block;text-align:center;margin-right:8px;">🌪️</span><span>Texas tornado start point</span>`;
          div.appendChild(row1);

          const row2 = document.createElement("div"); row2.className = "row";
          row2.innerHTML = `<span style="width:18px;height:4px;background:#4b0082;display:inline-block;margin-right:8px;border-radius:2px;"></span><span>Tornado path</span>`;
          div.appendChild(row2);
        }

        if (dataset.id === "hurricane") {
          const items = [
            ["🌀", "Storm observation point"],
            ["#fdd835", "Category 1 — Very Dangerous"],
            ["#fb8c00", "Category 2 — Extremely Dangerous"],
            ["#f4511e", "Category 3 — Devastating"],
            ["#d81b60", "Category 4 — Catastrophic"],
            ["#6a1b9a", "Category 5 — Total Destruction"]
          ];

          items.forEach((it, idx) => {
            const row = document.createElement("div");
            row.className = "row";
            if (idx === 0) {
              row.innerHTML = `<span style="width:18px;display:inline-block;text-align:center;margin-right:8px;">${it[0]}</span><span>${it[1]}</span>`;
            } else {
              row.innerHTML = `<span style="width:18px;height:4px;background:${it[0]};display:inline-block;margin-right:8px;border-radius:2px;"></span><span>${it[1]}</span>`;
            }
            div.appendChild(row);
          });
        }

        if (dataset.id === "other-truck") {
          const row1 = document.createElement("div"); row1.className = "row";
          row1.innerHTML = `<span style="width:18px;display:inline-block;text-align:center;margin-right:8px;">⚠️</span><span>Nearby truck-related crash</span>`;
          div.appendChild(row1);

          const row2 = document.createElement("div"); row2.className = "row";
          row2.innerHTML = `<span style="width:18px;height:3px;background:#2f4f4f;display:inline-block;margin-right:8px;border-radius:2px;"></span><span>Bridge-crash link</span>`;
          div.appendChild(row2);
        }

        return div;
      };
      legendControl.addTo(map);

      status.textContent =
        `Dataset: ${dataset.name}\n` +
        `File: ${dataset.csvUrl}\n` +
        `Showing: Top 20\n` +
        `Points: ${groupsByType["Top 20"].length}\n` +
        `Marker size is FIXED (same for all).`;

      await drawHazardOverlays(points, dataset);

      typeFilter.onchange = async () => {
        if (currentLayer) map.removeLayer(currentLayer);

        let markersToShow = [];
        if (typeFilter.value === "__ALL__") markersToShow = groupsByType["__ALL__"];
        else markersToShow = groupsByType[typeFilter.value] || [];

        currentLayer = L.featureGroup(markersToShow).addTo(map);
        const bb = currentLayer.getBounds();
        if (bb.isValid()) map.fitBounds(bb.pad(0.1));

        const label = (typeFilter.value === "__ALL__") ? "All bridges" : typeFilter.value;
        status.textContent =
          `Dataset: ${dataset.name}\n` +
          `File: ${dataset.csvUrl}\n` +
          `Showing: ${label}\n` +
          `Points: ${markersToShow.length}\n` +
          `Marker size is FIXED (same for all).`;

        await drawHazardOverlays(lastPoints, lastDataset);
      };
    }

    hazardToggle.addEventListener("change", async () => {
      if (lastPoints.length && lastDataset) {
        await drawHazardOverlays(lastPoints, lastDataset);
      }
    });

    trackToggle.addEventListener("change", async () => {
      if (lastPoints.length && lastDataset) {
        await drawHazardOverlays(lastPoints, lastDataset);
      }
    });

    // =========================================================
    // 6) BOOTSTRAP / RELOAD
    // =========================================================
    function getSelectedDataset() {
      const id = riskDataset.value;
      return DATASETS.find(d => d.id === id) || DATASETS[0];
    }

    async function loadAndPlot() {
      try {
        const ds = getSelectedDataset();
        status.textContent = `Fetching ${ds.csvUrl}…\nDataset: ${ds.name}`;
        const rows = await readCsvObjectsFromUrl(ds.csvUrl);
        await plotFromRows(rows, ds);
      } catch (err) {
        console.error(err);
        status.textContent =
          `Error: ${err.message}\n\nTips:\n` +
          `• Put ALL CSV files in the SAME folder as this HTML.\n` +
          `• If opening by double-click fails (CORS), run a local server:\n` +
          `  - VS Code Live Server OR\n` +
          `  - python -m http.server\n`;
      }
    }

    reloadBtn.addEventListener("click", loadAndPlot);
    riskDataset.addEventListener("change", loadAndPlot);
    window.addEventListener("DOMContentLoaded", loadAndPlot);
  </script>
